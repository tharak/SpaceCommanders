<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#07101e" />
    <title>Space Commanders</title>
  </head>
  <body>
    <main id="app">
      <canvas id="game"></canvas>
      <div id="hud">
        <header class="topbar">
          <div id="status"></div>
          <button id="debug-toggle" class="icon-button debug">⌘</button>
        </header>
        <div id="enemy-countdown" aria-live="polite"></div>
        <section id="command-deck">
          <div id="upgrade-menu" class="command-group">
            <div class="upgrade-content">
              <div id="money-display" aria-live="polite">
                <strong id="money-amount">0</strong
                ><span data-text="money"></span>
              </div>
            </div>
            <div id="upgrade-controls"></div>
          </div>
          <div class="command-row">
            <div class="command-group">
              <div id="formation-controls" class="icon-row"></div>
            </div>
            <div class="command-group">
              <div id="fire-controls" class="icon-row"></div>
            </div>
          </div>
        </section>
        <div id="order-readout"></div>
        <aside id="debug-panel" aria-label="Simulation tuning">
          <div id="game-selection" class="game-selection">
            <button type="button" data-game="command"></button>
            <button type="button" data-game="invaders"></button>
            <button type="button" data-game="formations"></button>
          </div>
        </aside>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
