<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#07101e" />
    <title>Space Commanders</title>
  </head>
  <body>
    <main id="app">
      <canvas id="game" aria-label="Space Commanders tactical map"></canvas>
      <div id="hud">
        <header class="topbar">
          <div>
            <span class="eyebrow">FLEET COMMAND // 01</span>
            <h1>SPACE <b>COMMANDERS</b></h1>
          </div>
          <div id="status"></div>
          <button
            id="debug-toggle"
            class="icon-button debug"
            aria-label="Open simulation tuning"
          >
            ⌘
          </button>
        </header>
        <section id="command-deck">
          <div class="command-group">
            <span>UPGRADES</span>
            <div id="upgrade-controls" class="upgrade-row"></div>
          </div>
          <div class="command-row">
            <div class="command-group">
              <span>FORMATION</span>
              <div id="formation-controls" class="icon-row"></div>
            </div>
            <div class="command-group">
              <span>SHOOT MODE</span>
              <div id="fire-controls" class="icon-row"></div>
            </div>
          </div>
        </section>
        <div id="order-readout">
          SELECT A FORMATION, THEN TAP THE MAP TO ISSUE AN ORDER
        </div>
        <aside id="debug-panel" aria-label="Simulation tuning">
          <div id="setup-title" class="panel-title">SIMULATION TUNING</div>
          <p id="setup-message">
            Configure the simulation, then begin the match.
          </p>
          <div id="game-selection" class="game-selection">
            <button type="button" data-game="command">
              COMMANDERS <small>TACTICAL CONQUEST</small>
            </button>
            <button type="button" data-game="invaders">
              PLANETARY DEFENSE <small>WAVE DEFENSE</small>
            </button>
          </div>
          <div class="captain-selection">
            <span>CAPTAIN FORMATION</span>
            <div id="captain-formation-controls" class="icon-row"></div>
          </div>
          <label
            >BATTLESHIPS
            <input
              id="ship-count"
              type="range"
              min="3"
              max="20"
              value="10" /><output></output></label
          ><label
            >PLANETS
            <input
              id="planet-count"
              type="range"
              min="2"
              max="8"
              value="5" /><output></output></label
          ><label
            >ASTEROID FIELDS
            <input
              id="asteroid-count"
              type="range"
              min="0"
              max="6"
              value="3" /><output></output></label
          ><label
            >GAME SPEED
            <input
              id="game-speed"
              type="range"
              min="0.5"
              max="2"
              step="0.25"
              value="1" /><output></output
          ></label>
          <p>Changes apply when a new match starts.</p>
          <button id="reset-game" class="start-button" type="button">
            START MATCH
          </button>
        </aside>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
