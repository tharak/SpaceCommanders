<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#07101e" />
    <title>Space Commanders</title>
  </head>
  <body>
    <main id="app">
      <canvas id="game" aria-label=""></canvas>
      <div id="hud">
        <header class="topbar">
          <div>
            <span class="eyebrow"></span>
            <h1></h1>
          </div>
          <div id="status"></div>
          <button id="debug-toggle" class="icon-button debug" aria-label="">
            ⌘
          </button>
        </header>
        <div id="enemy-countdown" aria-live="polite"></div>
        <section id="command-deck">
          <div class="command-group">
            <div class="upgrade-content">
              <div id="money-display" aria-live="polite">
                <strong id="money-amount">0</strong
                ><span data-text="money"></span>
              </div>
            </div>
            <div id="upgrade-controls" class="upgrade-row"></div>
          </div>
          <div class="command-row">
            <div class="command-group">
              <div id="formation-controls" class="icon-row"></div>
            </div>
            <div class="command-group">
              <div id="fire-controls" class="icon-row"></div>
            </div>
          </div>
        </section>
        <div id="order-readout"></div>
        <aside id="debug-panel" aria-label="Simulation tuning">
          <div id="setup-title" class="panel-title"></div>
          <p id="setup-message"></p>
          <div id="game-selection" class="game-selection">
            <button type="button" data-game="command"></button>
            <button type="button" data-game="invaders"></button>
          </div>
          <div class="captain-selection">
            <span data-text="captain-formation"></span>
            <div id="captain-formation-controls" class="icon-row"></div>
          </div>
          <label>
            <span data-text="battleships"></span>
            <input
              id="ship-count"
              type="range"
              min="3"
              max="20"
              value="10" /><output></output></label
          ><label>
            <span data-text="planets"></span>
            <input
              id="planet-count"
              type="range"
              min="2"
              max="8"
              value="5" /><output></output></label
          ><label>
            <span data-text="asteroids"></span>
            <input
              id="asteroid-count"
              type="range"
              min="0"
              max="6"
              value="3" /><output></output></label
          ><label>
            <span data-text="speed"></span>
            <input
              id="game-speed"
              type="range"
              min="0.5"
              max="2"
              step="0.25"
              value="1" /><output></output
          ></label>
          <p data-text="apply-on-start"></p>
          <button id="reset-game" class="start-button" type="button"></button>
        </aside>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
